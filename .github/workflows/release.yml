name: Release
on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 09:00 UTC
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    name: Check for Swagger UI updates
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v5
      - name: Check for new version
        id: check
        run: |
          CURRENT=$(cat flask_swagger_ui/dist/VERSION)
          LATEST=$(curl -s https://api.github.com/repos/swagger-api/swagger-ui/releases/latest | jq -r .tag_name)
          VERSION_NUM=${LATEST#v}
          echo "current=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "latest=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION_NUM}" >> "$GITHUB_OUTPUT"
          if [ "$CURRENT" = "$LATEST" ]; then
            echo "Already up to date (${CURRENT})"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Update available: ${CURRENT} -> ${LATEST}"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Update dist
        if: steps.check.outputs.changed == 'true'
        run: bash update-dist.sh
      - name: Update version references
        if: steps.check.outputs.changed == 'true'
        run: |
          VERSION_NUM=${{ steps.check.outputs.version }}
          sed -i "s/^version = \".*\"/version = \"${VERSION_NUM}\"/" pyproject.toml
          sed -i "s/Included Swagger UI version: .*/Included Swagger UI version: ${VERSION_NUM}./" README.md
      - name: Commit and tag
        if: steps.check.outputs.changed == 'true'
        run: |
          VERSION_NUM=${{ steps.check.outputs.version }}
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Update to version ${VERSION_NUM}"
          git tag "v${VERSION_NUM}"
          git push origin main --tags

  build:
    name: Build
    permissions:
      contents: read
    needs: [update]
    if: |
      always() && (
        (github.event_name == 'push') ||
        (github.event_name == 'pull_request') ||
        (needs.update.outputs.changed == 'true')
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.update.outputs.changed == 'true' && 'main' || '' }}
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install build dependencies
        run: python -m pip install --upgrade pip build
      - name: Build package
        run: python -m build
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: false
      - name: Run e2e test
        run: ./test.sh
      - name: Store package artifact
        uses: actions/upload-artifact@v5
        with:
          name: dist
          path: dist/
          retention-days: 1

  test-pypi-publish:
    name: Publish to TestPyPI
    needs: [update, build]
    if: |
      always() && needs.build.result == 'success' &&
      needs.update.outputs.changed == 'true'
    runs-on: ubuntu-latest
    environment:
      name: test
      url: https://test.pypi.org/p/flask-swagger-ui
    permissions:
      id-token: write
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist/
      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  smoke-test:
    name: Smoke test from TestPyPI
    permissions:
      contents: read
    needs: [update, test-pypi-publish]
    if: |
      always() && needs.test-pypi-publish.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install from TestPyPI
        run: |
          for i in 1 2 3 4 5; do
            pip install --index-url https://test.pypi.org/simple/ --extra-index-url https://pypi.org/simple/ flask-swagger-ui && break
            echo "Attempt $i failed, waiting for package to be available..."
            sleep 30
          done
      - name: Verify import
        run: python -c "from flask_swagger_ui import get_swaggerui_blueprint; print('OK')"

  pypi-publish:
    name: Publish to PyPI
    needs: [update, build, smoke-test]
    if: false
    # if: |
    #   always() && needs.smoke-test.result == 'success'
    runs-on: ubuntu-latest
    environment:
      name: release
      url: https://pypi.org/p/flask-swagger-ui
    permissions:
      id-token: write
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
